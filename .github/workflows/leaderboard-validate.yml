name: Leaderboard Validate
on:
  pull_request:
    paths:
      - 'leaderboard/data/**.json'
      - 'leaderboard/scripts/*.py'
      - 'leaderboard/benchmarks/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install jsonschema pyyaml
      - run: python leaderboard/scripts/build_benchmarks_json.py --check
      - run: python leaderboard/scripts/validate.py
