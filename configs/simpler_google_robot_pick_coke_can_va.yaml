# SimplerEnv evaluation -- Google Robot Variant Aggregation (VA).
#
# Variant matrix derived from the SimplerEnv evaluation scripts at:
#   https://github.com/simpler-env/SimplerEnv/tree/main/scripts

server:
  url: ws://localhost:8000
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/simpler:latest
  env:
  - NVIDIA_DRIVER_CAPABILITIES=all
  volumes:
  - /usr/share/vulkan/icd.d:/usr/share/vulkan/icd.d:ro
output_dir: ./results

_shared_init_config: &init_config
  robot_x: [0.35, 0.35, 1]
  robot_y: [0.2, 0.2, 1]
  obj_x: [-0.35, -0.12, 5]
  obj_y: [-0.02, 0.42, 5]

_shared_build_kwargs: &build_kwargs
  lr_switch: true
  robot: google_robot_static
  sim_freq: 513
  control_freq: 3

benchmarks:
  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: pick_coke_can_va_horizontal_base
    mode: sync
    episodes_per_task: 25
    params:
      task_name: "google_robot_pick_horizontal_coke_can"
      env_name: "GraspSingleOpenedCokeCanInScene-v0"
      scene_name: "google_pick_coke_can_1_v4"
      env_build_kwargs: *build_kwargs
      init_config: *init_config

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: pick_coke_can_va_horizontal_table_tex_1
    mode: sync
    episodes_per_task: 25
    params:
      task_name: "google_robot_pick_horizontal_coke_can"
      env_name: "GraspSingleOpenedCokeCanInScene-v0"
      scene_name: "Baked_sc1_staging_objaverse_cabinet1_h870"
      env_build_kwargs: *build_kwargs
      init_config: *init_config

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: pick_coke_can_va_horizontal_table_tex_2
    mode: sync
    episodes_per_task: 25
    params:
      task_name: "google_robot_pick_horizontal_coke_can"
      env_name: "GraspSingleOpenedCokeCanInScene-v0"
      scene_name: "Baked_sc1_staging_objaverse_cabinet2_h870"
      env_build_kwargs: *build_kwargs
      init_config: *init_config

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: pick_coke_can_va_horizontal_distractor_default
    mode: sync
    episodes_per_task: 25
    params:
      task_name: "google_robot_pick_horizontal_coke_can"
      env_name: "GraspSingleOpenedCokeCanDistractorInScene-v0"
      scene_name: "google_pick_coke_can_1_v4"
      env_build_kwargs: *build_kwargs
      init_config: *init_config

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: pick_coke_can_va_horizontal_distractor_more
    mode: sync
    episodes_per_task: 25
    params:
      task_name: "google_robot_pick_horizontal_coke_can"
