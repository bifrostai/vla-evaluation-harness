# ManiSkill2 full evaluation — 5 tasks × 50 episodes

server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/maniskill2:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.maniskill2.benchmark:ManiSkill2Benchmark"
    episodes_per_task: 50
    max_steps: 400
    params:
      tasks:
        - "PickCube-v0"
        - "StackCube-v0"
        - "PickSingleYCB-v0"
        - "PickSingleEGAD-v0"
        - "PickClutterYCB-v0"
      max_episode_steps: 400
      render_resolution: [256, 256]
      enabled_cameras: ["base_camera"]

