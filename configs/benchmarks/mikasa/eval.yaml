# MIKASA-Robo evaluation (12 tasks × 50 episodes)
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/mikasa-robo:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.mikasa.benchmark:MIKASABenchmark"
    episodes_per_task: 3
    params:
      tasks:
        - "RememberColor3-v0"
        - "ShellGameTouch-v0"
        - "RotateLenientPos-v0"
        - "InterceptSlow-v0"
        - "TakeItBack-v0"
      render_resolution: [256, 256]
    action_dim: 8

