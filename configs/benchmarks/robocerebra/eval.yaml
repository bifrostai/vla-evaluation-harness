# RoboCerebra evaluation (5 tasks × 50 episodes)
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/robocerebra:latest
  runtime: nvidia

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.robocerebra.benchmark:RoboCerebraBenchmark"
    episodes_per_task: 1
    params:
      robocerebra_root: "/workspace/RoboCerebra_Bench"
      task_types:
        - Ideal
      seed: 7

