# MolmoSpaces-Bench: pick-and-place (Franka FR3, procthor-objaverse)
# Matches MolmoBot paper's eval pipeline (FrankaState8ClampAbsPosConfig, horizon=600).
# Benchmark assets (~15 GB) are embedded in the Docker image; no volume mount needed.

server:
  url: "ws://localhost:8000"
  timeout: 600.0

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/molmospaces:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.molmospaces.benchmark:MolmoSpacesBenchmark"
    episodes_per_task: 1
    max_steps: 600
    params:
      # Baked into the image by docker/Dockerfile.molmospaces under $MLSPACES_ASSETS_DIR.
      benchmark_dir: "/assets/benchmarks/molmospaces-bench-v2/procthor-objaverse/FrankaPickandPlaceHardBench/FrankaPickandPlaceHardBench_20260212_200ep_json_benchmark"
      eval_config_cls: "olmo.eval.configure_molmo_spaces:FrankaState8ClampAbsPosConfig"
      task_horizon: 600
      send_wrist_image: true
      send_state: true
