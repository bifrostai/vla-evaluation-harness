# CALVIN ABC→D evaluation (1000 sequences × 5 chained subtasks)
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/calvin:latest
  env:
    - "NVIDIA_DRIVER_CAPABILITIES=all"

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.calvin.benchmark:CALVINBenchmark"
    episodes_per_task: 1
    params:
      dataset_path: "/data/calvin/dataset/validation"
      num_sequences: 1000
      seed: 0

