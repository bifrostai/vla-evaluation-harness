# LIBERO-Pro evaluation (10 tasks × 50 episodes)
#
# Uses LIBERO-Pro's extended suites (object-replacement variants).
# Available suites include libero_spatial_with_mug, libero_goal_with_red_stick,
# libero_10_with_blue_stick, etc.
#
# For OOD perturbation suites (swap, lan, object, task, env), set
# perturbation: <type> and pre-generate BDDL/init files via perturbation.py.
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero-pro:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero_pro.benchmark:LIBEROProBenchmark"
    episodes_per_task: 50
    params:
      suite: libero_spatial_with_mug
      seed: 7
      num_steps_wait: 10

