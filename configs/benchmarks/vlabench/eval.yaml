# VLABench evaluation (100 tasks × 20 episodes)
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/vlabench:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.vlabench.benchmark:VLABenchBenchmark"
    episodes_per_task: 3
    params:
      tasks:
        - "select_fruit"
        - "select_toy"
        - "select_drink"
      robot: "franka"
      max_steps: 200

