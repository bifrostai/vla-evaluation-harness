# RoboMME Reference suite (4 tasks × 50 episodes)
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/robomme:latest
  gpus: "all"
  env:
    - "NVIDIA_DRIVER_CAPABILITIES=all"
  volumes:
    - "/usr/share/vulkan/icd.d:/usr/share/vulkan/icd.d:ro"

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.robomme.benchmark:RoboMMEBenchmark"
    subname: reference
    episodes_per_task: 50
    params:
      tasks: [PickHighlight, VideoRepick, VideoPlaceButton, VideoPlaceOrder]
      action_space: joint_angle
      max_steps: 1300
