# SimplerEnv — Google Robot Variant Aggregation (VA).
#
# Variant matrix derived from the SimplerEnv evaluation scripts at:
#   https://github.com/simpler-env/SimplerEnv/tree/main/scripts

server:
  url: ws://localhost:8000
docker:
  image: ghcr.io/allenai/vla-evaluation-harness/simpler:latest
  env:
  - NVIDIA_DRIVER_CAPABILITIES=all
  volumes:
  - /usr/share/vulkan/icd.d:/usr/share/vulkan/icd.d:ro
output_dir: ./results

_shared_init_config: &init_config
  robot_x: [0.65, 0.85, 3]
  robot_y: [-0.2, 0.2, 3]
  obj_x: [0, 0, 1]
  obj_y: [0, 0, 1]

_shared_build_kwargs: &build_kwargs
  shader_dir: rt
  robot: google_robot_static
  sim_freq: 513
  control_freq: 3

benchmarks:
  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: drawer_va_open_top_base
    episodes_per_task: 9
    params:
      task_name: "google_robot_open_top_drawer"
      env_name: "OpenTopDrawerCustomInScene-v0"
      scene_name: "frl_apartment_stage_simple"
      env_build_kwargs: *build_kwargs
      init_config: *init_config

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: drawer_va_open_top_bg_bedroom
    episodes_per_task: 9
    params:
      task_name: "google_robot_open_top_drawer"
      env_name: "OpenTopDrawerCustomInScene-v0"
      scene_name: "modern_bedroom_no_roof"
      env_build_kwargs: *build_kwargs
      init_config: *init_config

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: drawer_va_open_top_bg_office
    episodes_per_task: 9
    params:
      task_name: "google_robot_open_top_drawer"
      env_name: "OpenTopDrawerCustomInScene-v0"
      scene_name: "modern_office_no_roof"
      env_build_kwargs: *build_kwargs
      init_config: *init_config

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: drawer_va_open_top_light_bright
    episodes_per_task: 9
    params:
      task_name: "google_robot_open_top_drawer"
      env_name: "OpenTopDrawerCustomInScene-v0"
      scene_name: "frl_apartment_stage_simple"
      env_build_kwargs:
        shader_dir: "rt"
        light_mode: "brighter"
        robot: "google_robot_static"
        sim_freq: 513
        control_freq: 3
      init_config: *init_config

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: drawer_va_open_top_light_dark
