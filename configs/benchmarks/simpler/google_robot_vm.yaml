# SimplerEnv evaluation — Google Robot tasks (6 tasks)
# Reference: NVIDIA Isaac-GR00T SimplerEnv README
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/simpler:latest
  env:
    - "NVIDIA_DRIVER_CAPABILITIES=all"
  volumes:
    - "/usr/share/vulkan/icd.d:/usr/share/vulkan/icd.d:ro"

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: pick_coke_can
    episodes_per_task: 24
    params:
      task_name: "google_robot_pick_coke_can"

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: pick_object
    episodes_per_task: 24
    params:
      task_name: "google_robot_pick_object"

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: move_near
    episodes_per_task: 24
    params:
      task_name: "google_robot_move_near"

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: open_drawer
    episodes_per_task: 24
    params:
      task_name: "google_robot_open_drawer"

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: close_drawer
    episodes_per_task: 24
    params:
      task_name: "google_robot_close_drawer"

  - benchmark: "vla_eval.benchmarks.simpler.benchmark:SimplerEnvBenchmark"
    subname: place_in_closed_drawer
    episodes_per_task: 24
    params:
      task_name: "google_robot_place_in_closed_drawer"
