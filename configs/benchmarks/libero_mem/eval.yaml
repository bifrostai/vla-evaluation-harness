# LIBERO-Mem suite (10 memory-dependent tasks × 50 episodes)
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero-mem:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero_mem.benchmark:LIBEROMemBenchmark"
    episodes_per_task: 50
    params:
      suite: libero_mem
      seed: 7
      num_steps_wait: 10
