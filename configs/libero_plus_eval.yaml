# LIBERO-Plus — quick reproduction config (libero_spatial, 25 variants).
#
# Intended for fast pipeline sanity-checks and score-reproduction runs.
# For a full robustness evaluation, prefer the per-suite configs
# (libero_plus_spatial.yaml) or set params.max_tasks explicitly.
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero-plus:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero_plus.benchmark:LIBEROPlusBenchmark"
    mode: sync
    episodes_per_task: 1
    params:
      suite: libero_spatial
      seed: 7
      num_steps_wait: 10
      max_tasks: 25
