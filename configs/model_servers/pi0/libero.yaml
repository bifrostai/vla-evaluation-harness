# π₀.5 model server — LIBERO (direct OpenPI inference)
# Loads the policy checkpoint directly; no external server needed.
#
#
# Available config_name values (see openpi repo):
#   pi0_fast_libero, pi05_libero, pi0_fast_droid, pi05_droid, ...
#
# The default config is pi05_libero (π₀.5), which achieves 96.85% on LIBERO.
# pi0_fast_libero is a different, lower-performing variant.

script: "src/vla_eval/model_servers/pi0.py"
args:
  config_name: pi05_libero
  image_key: "observation/image"
  wrist_image_key: "observation/wrist_image"
  state_key: "observation/state"
  state_dim: 8
  image_resolution: 224
  chunk_size: 10
  port: 8000
