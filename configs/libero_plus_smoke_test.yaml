# LIBERO-Plus smoke test (1 task variant × 1 episode, EchoModelServer)
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero-plus:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero_plus.benchmark:LIBEROPlusBenchmark"
    mode: sync
    episodes_per_task: 1
    max_tasks: 1
    params:
      suite: libero_spatial
      seed: 7
      num_steps_wait: 10
      max_tasks: 1
