# All 4 classified LIBERO-Plus suites (1 episode per variant).
#
# libero_90 has no task_classification.json entries and is skipped —
# use configs/libero_plus_spatial.yaml as a template if you need to run
# a single suite standalone.
#
# Total episode count ≈ 2,402 + 2,518 + 2,591 + 2,519 = 10,030 variants,
# matching the LIBERO-Plus paper protocol (arXiv 2510.13626).
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero-plus:latest

output_dir: "./results"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero_plus.benchmark:LIBEROPlusBenchmark"
    subname: libero_plus_spatial
    mode: sync
    episodes_per_task: 1
    params:
      suite: libero_spatial
      seed: 7
      num_steps_wait: 10

  - benchmark: "vla_eval.benchmarks.libero_plus.benchmark:LIBEROPlusBenchmark"
    subname: libero_plus_object
    mode: sync
    episodes_per_task: 1
    params:
      suite: libero_object
      seed: 7
      num_steps_wait: 10

  - benchmark: "vla_eval.benchmarks.libero_plus.benchmark:LIBEROPlusBenchmark"
    subname: libero_plus_goal
    mode: sync
    episodes_per_task: 1
    params:
      suite: libero_goal
      seed: 7
      num_steps_wait: 10

  - benchmark: "vla_eval.benchmarks.libero_plus.benchmark:LIBEROPlusBenchmark"
    subname: libero_plus_10
    mode: sync
    episodes_per_task: 1
    params:
      suite: libero_10
      seed: 7
      num_steps_wait: 10
