# VLANeXt LIBERO-Object benchmark config
server:
  url: "ws://localhost:8000"

docker:
  image: ghcr.io/allenai/vla-evaluation-harness/libero:latest

output_dir: "./results/vlanext_libero_object"

benchmarks:
  - benchmark: "vla_eval.benchmarks.libero.benchmark:LIBEROBenchmark"
    subname: libero_object
    mode: sync
    episodes_per_task: 50
    params:
      suite: libero_object
      seed: 7
      num_steps_wait: 10
